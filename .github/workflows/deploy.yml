name: Deploy

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  deployments: write


jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Database Migrations
        run: pnpm prisma migrate deploy
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_DATABASE_URL: ${{ secrets.DIRECT_DATABASE_URL }}

      - name: Install Vercel CLI
        run: pnpm install -g vercel

      - name: Pull Vercel Environment Information
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build Project Artifacts
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy Project Artifacts to Vercel
        id: vercel-deploy
        run: |
          DEPLOY_URL=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "DEPLOY_URL=$DEPLOY_URL" >> $GITHUB_ENV
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Create Sentry Release
        run: |
          npx @sentry/cli releases new "$GITHUB_SHA"
          npx @sentry/cli releases set-commits "$GITHUB_SHA" --auto || true
          npx @sentry/cli releases finalize "$GITHUB_SHA"
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}

      - name: Run smoke test GET /api/health
        run: |
          sleep 10
          STATUS_CODE=$(curl -o response.json -s -w "%{http_code}" "${{ env.DEPLOY_URL }}/api/health")
          cat response.json
          if [ "$STATUS_CODE" -ne 200 ]; then
            echo "Smoke test failed with status $STATUS_CODE"
            exit 1
          fi
          echo "Smoke test passed with status $STATUS_CODE"

      - name: Deploy to Prisma Compute
        uses: prisma/project-compute/github-action@main
        with:
          api-token: ${{ secrets.PRISMA_API_TOKEN }}
          compute-service-id: cmqbp95bk01fm0gdvprx9iz2q

          


      